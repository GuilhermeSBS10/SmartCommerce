# Copie este arquivo para application-local.properties ou para seu ambiente.
# Depois da implementacao SQL, remova os placeholders e ligue DataSource/JPA/Flyway.

spring.datasource.url=jdbc:mysql://localhost:3306/smartcommerce?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Fortaleza
spring.datasource.username=smartcommerce_user
spring.datasource.password=troque_esta_senha
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
