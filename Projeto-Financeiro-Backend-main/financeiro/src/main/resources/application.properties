spring.application.name=financeiro
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/smartcommerce?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Fortaleza
spring.datasource.username=smartcommerce_user
spring.datasource.password=smartcommerce123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
