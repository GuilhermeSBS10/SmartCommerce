spring.application.name=financeiro
server.port=8080

# Base preparada para a futura integracao com MySQL via variaveis de ambiente.
app.persistence.provider=sql
app.persistence.status=pendente

# Preencher quando a implementacao SQL for concluida.
financeiro.datasource.url=${DB_URL:}
financeiro.datasource.username=${DB_USERNAME:}
financeiro.datasource.password=${DB_PASSWORD:}
financeiro.datasource.schema=${DB_SCHEMA:smartcommerce}
